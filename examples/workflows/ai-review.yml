# Example consumer workflow. Copy this into a consumer repo at
# .github/workflows/pr-review.yml and fill in the secret + provider of choice.
#
# NOTE: This file is intentionally NOT under .github/workflows/ in the
# woo-review repo itself — it's a template for downstream users.
#
# !!! SECURITY: pull_request_target trigger !!!
# The job below runs on `pull_request_target`, which executes with the base
# branch's write-scope token. The default `actions/checkout` below intentionally
# omits `ref:` — that makes it check out the BASE ref (safe). DO NOT add
# `ref: ${{ github.event.pull_request.head.sha }}` or you will be running
# untrusted PR code with a token that can comment/label/merge. The `labeled`
# event filter + `ai-review` label gate further reduce blast radius by
# requiring a maintainer to opt-in each PR.
# See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions

name: PR Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/package.json'
      - 'pnpm-lock.yaml'
      - '.gitignore'
  pull_request_target:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # NOTE: bot-author skip (dependabot/renovate/github-actions) + release-rollup
    # title skip are now enforced inside the action by .woo-review/config.json defaults,
    # so the workflow no longer needs to hard-code them. `/woo-review force` in
    # a PR comment overrides those skips — that path is what the issue_comment
    # branch below enables.
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'ai-review') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && (contains(github.event.comment.body, '@review') || contains(github.event.comment.body, '/woo-review')))
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    concurrency:
      group: pr-review-${{ github.event.pull_request.number || github.event.issue.number || github.event.number }}
      cancel-in-progress: true

    steps:
      # Do NOT add `ref: pull_request.head.sha` — see security note at top.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      # === Pick exactly one of the four provider blocks below ===

      # Anthropic (Claude)
      # Production: replace @v0.1.0 with a full commit SHA (supply-chain hardening).
      - uses: howarewoo/woo-review@v0.1.0
        with:
          provider: anthropic
          anthropic_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6

      # OpenAI (Codex)
      # - uses: howarewoo/woo-review@v0.1.0
      #   with:
      #     provider: openai
      #     openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      #     model: gpt-5

      # Google (Gemini)
      # - uses: howarewoo/woo-review@v0.1.0
      #   with:
      #     provider: google
      #     gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      #     model: gemini-2.5-pro

      # OpenRouter (via opencode)
      # - uses: howarewoo/woo-review@v0.1.0
      #   with:
      #     provider: openrouter
      #     openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
      #     model: openrouter/deepseek/deepseek-v4-flash
