name: Parallel AI Review
on:
  workflow_call:
    inputs:
      provider:
        description: 'Explicit provider: anthropic | openai | google | openrouter.'
        type: string
        required: false
      model:
        description: 'Model identifier passed to the chosen runner.'
        type: string
        required: false
      trigger_phrase:
        description: 'Phrase that triggers a review when posted in a PR comment.'
        type: string
        required: false
        default: '@review'
      max_turns:
        description: 'Maximum agent turns.'
        type: string
        required: false
        default: '30'
      skip_labels:
        description: 'Comma-separated list of PR labels that force-skip the review.'
        type: string
        required: false
      prompt_override:
        description: 'Optional path (relative to the consumer repo) to a custom prompt.'
        type: string
        required: false
      disable_angles:
        description: 'Comma-separated list of review angles to skip.'
        type: string
        required: false
      react_doctor_version:
        description: 'npm version of react-doctor to invoke.'
        type: string
        required: false
        default: 'latest'
      impeccable_version:
        description: 'npm version of impeccable CLI to invoke.'
        type: string
        required: false
        default: 'latest'
      incremental:
        description: 'Review scope: auto (re-use prior SHA marker, diff new commits only) or off (full PR diff). PR-comment `--full` overrides to off.'
        type: string
        required: false
        default: 'auto'
      enable_history_dedup:
        description: 'Drop findings duplicating prior PR threads or sidecar dismissals.'
        type: string
        required: false
        default: 'true'
      enable_sidecar_write:
        description: 'Commit newly-resolved threads to .woo-review/dismissed.json via bot.'
        type: string
        required: false
        default: 'true'
    secrets:
      anthropic_token:
        required: false
      anthropic_api_key:
        required: false
      openai_api_key:
        required: false
      google_api_key:
        required: false
      gemini_api_key:
        required: false
      openrouter_api_key:
        required: false

# Cancel superseded runs on the same PR so rapid pushes do not queue parallel
# expensive AI passes.
concurrency:
  group: woo-review-${{ github.event.pull_request.number || github.event.issue.number || github.event.number }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      angles: ${{ steps.woo.outputs.angles_json }}
      chunks: ${{ steps.woo.outputs.chunks_json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Self-references pinned to the current tag. Bump in lockstep with releases.
      - id: woo
        uses: howarewoo/woo-review@v0.1.0
        with:
          mode: detect
          disable_angles: ${{ inputs.disable_angles }}
          incremental: ${{ inputs.incremental }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: review-artifacts
          path: /tmp/pr-review/
          retention-days: 1

  review:
    needs: detect
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    if: needs.detect.outputs.angles != '[]' && needs.detect.outputs.angles != ''
    # Two-dim matrix (issue #14): angles × chunks. When chunking does not
    # activate, `chunks` is `[""]` and the matrix collapses to one job per
    # angle (current behaviour, zero overhead). When it activates,
    # `chunks` is `["chunk-0", "chunk-1", ...]` and the matrix fans out as
    # angles × chunks so each worker stays inside the model context window.
    strategy:
      fail-fast: false
      matrix:
        angle: ${{ fromJson(needs.detect.outputs.angles) }}
        chunk: ${{ fromJson(needs.detect.outputs.chunks) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download base artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: review-artifacts
          path: /tmp/pr-review/
      - uses: howarewoo/woo-review@v0.1.0
        with:
          mode: review
          angle: ${{ matrix.angle }}
          chunk: ${{ matrix.chunk }}
          provider: ${{ inputs.provider }}
          model: ${{ inputs.model }}
          anthropic_token: ${{ secrets.anthropic_token }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          openai_api_key: ${{ secrets.openai_api_key }}
          google_api_key: ${{ secrets.google_api_key }}
          gemini_api_key: ${{ secrets.gemini_api_key }}
          openrouter_api_key: ${{ secrets.openrouter_api_key }}
          trigger_phrase: ${{ inputs.trigger_phrase }}
          max_turns: ${{ inputs.max_turns }}
          skip_labels: ${{ inputs.skip_labels }}
          prompt_override: ${{ inputs.prompt_override }}
          react_doctor_version: ${{ inputs.react_doctor_version }}
          impeccable_version: ${{ inputs.impeccable_version }}
      # Artifact name includes the chunk suffix so multiple chunk jobs for the
      # same angle cannot collide on upload. `chunk` is `""` in the un-chunked
      # case → suffix collapses to `-all`; the merge step globs `findings-*`.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: findings-${{ matrix.angle }}-${{ matrix.chunk || 'all' }}
          path: /tmp/pr-review/findings.${{ matrix.angle }}*.json
          retention-days: 1
          if-no-files-found: ignore

  validate:
    needs: [detect, review]
    # Validator runs on partial review failures too — fail-fast is off so a single
    # angle failure must not prevent posting findings from the angles that did succeed.
    # Only skip if detection failed/cancelled or the whole run was cancelled.
    if: always() && needs.detect.result == 'success' && needs.review.result != 'cancelled'
    runs-on: ubuntu-latest
    # `contents: read` is sufficient — sidecar commit/push moved to the
    # `sidecar-write` job below (issue #33), so the validator (which runs the
    # LLM step against untrusted PR content) never sees `contents: write`.
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download base artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: review-artifacts
          path: /tmp/pr-review/
      - name: Download findings
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          pattern: findings-*
          path: /tmp/pr-review/
          merge-multiple: true

      # Adversarial validator (issue #13): prosecutor pass writes
      # findings.prosecutor.json (inclusive bias), defender pass writes
      # findings.defender.json (exclusive bias) + runs intersect-findings.sh
      # to produce the final findings.json, then posts the review.
      # `disable_adversarial: true` in .woo-review.yml short-circuits the
      # prosecutor step (the intersect script then falls back to defender-only).
      - name: Read disable_adversarial flag
        id: adv
        shell: bash
        run: |
          if [ -f /tmp/pr-review/config.json ]; then
            disabled="$(jq -r '.disable_adversarial // false' /tmp/pr-review/config.json)"
          else
            disabled=false
          fi
          echo "disabled=$disabled" >> "$GITHUB_OUTPUT"
          echo "adversarial validator disabled=$disabled"

      - name: Validate (prosecutor pass)
        if: steps.adv.outputs.disabled != 'true'
        uses: howarewoo/woo-review@v0.1.0
        with:
          mode: validate-prosecutor
          disable_angles: ${{ inputs.disable_angles }}
          provider: ${{ inputs.provider }}
          model: ${{ inputs.model }}
          anthropic_token: ${{ secrets.anthropic_token }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          openai_api_key: ${{ secrets.openai_api_key }}
          google_api_key: ${{ secrets.google_api_key }}
          gemini_api_key: ${{ secrets.gemini_api_key }}
          openrouter_api_key: ${{ secrets.openrouter_api_key }}
          max_turns: ${{ inputs.max_turns }}
          skip_labels: ${{ inputs.skip_labels }}
          prompt_override: ${{ inputs.prompt_override }}

      - name: Merge action inputs into config.json
        shell: bash
        env:
          ENABLE_SIDECAR: ${{ inputs.enable_sidecar_write }}
          ENABLE_DEDUP: ${{ inputs.enable_history_dedup }}
        run: |
          CFG=/tmp/pr-review/config.json
          [ -f "$CFG" ] || echo '{}' > "$CFG"
          jq --argjson sw "$ENABLE_SIDECAR" --argjson hd "$ENABLE_DEDUP" \
             '.enable_sidecar_write = $sw | .enable_history_dedup = $hd' \
             "$CFG" > "$CFG.tmp" && mv "$CFG.tmp" "$CFG"

      # History dedup is invoked inside the validator (Step 3b in validator.md),
      # after intersect-findings.sh writes findings.json and before the post step.
      # Running it here would be a no-op because findings.json does not yet exist.

      - name: Validate (defender pass + intersect + post)
        uses: howarewoo/woo-review@v0.1.0
        with:
          mode: validate
          disable_angles: ${{ inputs.disable_angles }}
          provider: ${{ inputs.provider }}
          model: ${{ inputs.model }}
          anthropic_token: ${{ secrets.anthropic_token }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          openai_api_key: ${{ secrets.openai_api_key }}
          google_api_key: ${{ secrets.google_api_key }}
          gemini_api_key: ${{ secrets.gemini_api_key }}
          openrouter_api_key: ${{ secrets.openrouter_api_key }}
          max_turns: ${{ inputs.max_turns }}
          skip_labels: ${{ inputs.skip_labels }}
          prompt_override: ${{ inputs.prompt_override }}

      - name: Upload validator metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: validator-metrics
          path: /tmp/pr-review/validator-metrics.json
          retention-days: 7
          if-no-files-found: ignore

  # Sidecar write is its own job (issue #33) so `contents: write` does not
  # leak to the validator step (which runs an LLM against untrusted PR
  # content). Gated on `inputs.enable_sidecar_write` — when the flag is off
  # this job is skipped entirely and no elevated permission is granted.
  sidecar-write:
    needs: [detect, validate]
    if: inputs.enable_sidecar_write == 'true' && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      # Check out the PR head branch into the default workspace — the script
      # commits .woo-review/dismissed.json and pushes back to that branch.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: howarewoo/woo-review@v0.1.0
        with:
          mode: sidecar-write
          enable_sidecar_write: ${{ inputs.enable_sidecar_write }}
