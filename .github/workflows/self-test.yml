# Self-test: runs the action against PRs opened in this repo, using whichever
# provider secret is available. Lets us validate the action end-to-end before
# tagging a release.

name: Self-test

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (detect-angles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run detect-angles tests
        run: bash tests/detect-angles.test.sh

  review:
    name: Run self-review
    runs-on: ubuntu-latest
    needs: unit
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@review')) ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run woo-review (Anthropic)
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        uses: ./
        with:
          provider: anthropic
          anthropic_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
          constitution_path: constitution.md
