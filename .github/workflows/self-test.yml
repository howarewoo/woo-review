# Self-test: validates this repo on every push / PR.
#
# The `unit` job runs on every event and is the only required check.
# The `review` and `parallel-review` jobs require the CLAUDE_CODE_OAUTH_TOKEN
# secret and are manual-only (workflow_dispatch) to avoid billing live AI calls
# on every push.

name: Self-test

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: shellcheck (shell scripts)
        run: |
          shellcheck --version
          # --severity=error keeps the gate strict on real bugs (parse failures,
          # broken redirects, etc.) while allowing progressive style cleanup.
          shellcheck --severity=error tests/*.sh skills/woo-review/scripts/*.sh

      - name: actionlint (workflow YAML)
        env:
          ACTIONLINT_VERSION: 1.7.7
        run: |
          set -euo pipefail
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

      - name: Run detect-angles tests
        run: bash tests/detect-angles.test.sh

      - name: Run load-config tests
        run: bash tests/load-config.test.sh

      - name: Run finding-schema tests
        run: bash tests/finding-schema.test.sh

      - name: Run prompt-sync tests
        run: bash tests/prompt-sync.test.sh

      - name: Run dedup-against-history tests
        run: bash tests/dedup-against-history.test.sh

      - name: Run rule-recommendations tests
        run: bash tests/rule-recommendations.test.sh

      - name: Run sidecar-write tests
        run: bash tests/sidecar-write.test.sh

      - name: Smoke-test .woo-review.yml end-to-end
        # Drops a fixture config into a synthetic workspace, runs the
        # loader directly, then runs detect-angles to confirm `force:` lands
        # and `skip:` is honored. Validates the artifact tree the prefetch
        # step would normally build in a real PR run.
        run: |
          set -euo pipefail
          GITHUB_WORKSPACE="$(mktemp -d)"
          GITHUB_OUTPUT="$(mktemp)"
          export GITHUB_WORKSPACE GITHUB_OUTPUT
          mkdir -p /tmp/pr-review
          cat > "$GITHUB_WORKSPACE/.woo-review.yml" <<'YAML'
          angles:
            force: [database]
            skip:  [seo]
          severity_floor: high
          YAML
          cat > /tmp/pr-review/meta.json <<'JSON'
          {
            "headRefOid": "deadbeef", "baseRefName": "main",
            "title": "smoke", "body": "",
            "files": [{"path": "server/auth.py", "additions": 5, "deletions": 0}]
          }
          JSON
          cat > /tmp/pr-review/diff.txt <<'DIFF'
          diff --git a/server/auth.py b/server/auth.py
          +<meta name="robots" content="noindex" />
          DIFF
          bash skills/woo-review/scripts/load-config.sh
          test -f /tmp/pr-review/config.json
          jq -e '.severity_floor == "high"' /tmp/pr-review/config.json >/dev/null
          jq -e '.angles.force | index("database")' /tmp/pr-review/config.json >/dev/null
          bash skills/woo-review/scripts/detect-angles.sh
          grep -qE '^angles=.*database' "$GITHUB_OUTPUT"
          ! grep -qE '^angles=.*seo' "$GITHUB_OUTPUT"

  review:
    name: Run self-review (manual)
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Run woo-review (Anthropic)
        # Token scoped to the single step that consumes it — keep it out of env
        # for shellcheck/actionlint/setup steps.
        env:
          ANTHROPIC_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        if: env.ANTHROPIC_TOKEN != ''
        uses: ./
        with:
          provider: anthropic
          anthropic_token: ${{ env.ANTHROPIC_TOKEN }}
          model: claude-sonnet-4-6

  parallel-review:
    name: Parallel self-review (manual)
    needs: unit
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Detect
        id: detect
        env:
          ANTHROPIC_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        if: env.ANTHROPIC_TOKEN != ''
        uses: ./
        with:
          mode: detect
          provider: anthropic
          anthropic_token: ${{ env.ANTHROPIC_TOKEN }}

      - name: Review (bugs angle only — matrix is exercised by reusable workflow)
        env:
          ANTHROPIC_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        if: env.ANTHROPIC_TOKEN != '' && steps.detect.outputs.angles_json != '[]'
        uses: ./
        with:
          mode: review
          angle: bugs
          provider: anthropic
          anthropic_token: ${{ env.ANTHROPIC_TOKEN }}
          model: claude-sonnet-4-6

      - name: Mock findings for other angles
        env:
          ANTHROPIC_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        if: env.ANTHROPIC_TOKEN != ''
        shell: bash
        run: |
          mkdir -p /tmp/pr-review
          echo "[]" > /tmp/pr-review/findings.security.json

      - name: Validate
        env:
          ANTHROPIC_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        if: env.ANTHROPIC_TOKEN != ''
        uses: ./
        with:
          mode: validate
          provider: anthropic
          anthropic_token: ${{ env.ANTHROPIC_TOKEN }}
          model: claude-sonnet-4-6

  loop-reproduction:
    name: dedup closes loop (resolved / line-shift / reworded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prep fixture
        run: |
          mkdir -p /tmp/pr-review
          cat > /tmp/pr-review/findings.json <<'JSON'
          [ {"angle":"bugs","file":"x.ts","line":12,"severity":"HIGH","blocking":true,
             "title":"original","description":"d","fix_type":"prose","fix":"f","suggestion":null,
             "rule_quote":null,"semantic_key":"bugs/off-by-one-loop-bound","code_anchor":"AAA111AAA111"} ]
          JSON
          cat > /tmp/pr-review/prior-findings.json <<'JSON'
          [ {"file":"x.ts","line":12,"title":"original","author":"bot","status":"resolved",
             "semantic_key":"bugs/off-by-one-loop-bound","code_anchor":"AAA111AAA111"} ]
          JSON
          echo '[]' > /tmp/pr-review/sidecar-findings.json

      - name: Dedup must drop resolved match
        env:
          WOO_REVIEW_DISABLE_LLM_TIEBREAK: '1'
        run: |
          bash skills/woo-review/scripts/dedup-against-history.sh
          n=$(jq length /tmp/pr-review/findings.deduped.json)
          [ "$n" -eq 0 ] || { echo "expected 0 findings, got $n"; exit 1; }

      - name: Line-shift — anchor still matches when line differs
        env:
          WOO_REVIEW_DISABLE_LLM_TIEBREAK: '1'
        run: |
          cat > /tmp/pr-review/findings.json <<'JSON'
          [ {"angle":"bugs","file":"x.ts","line":17,"severity":"HIGH","blocking":true,
             "title":"original","description":"d","fix_type":"prose","fix":"f","suggestion":null,
             "rule_quote":null,"semantic_key":"bugs/off-by-one-loop-bound","code_anchor":"AAA111AAA111"} ]
          JSON
          bash skills/woo-review/scripts/dedup-against-history.sh
          n=$(jq length /tmp/pr-review/findings.deduped.json)
          [ "$n" -eq 0 ] || { echo "expected 0, got $n"; exit 1; }

      - name: Reworded title — sem_key match still wins
        env:
          WOO_REVIEW_DISABLE_LLM_TIEBREAK: '1'
        run: |
          cat > /tmp/pr-review/findings.json <<'JSON'
          [ {"angle":"bugs","file":"x.ts","line":12,"severity":"HIGH","blocking":true,
             "title":"completely reworded headline","description":"d","fix_type":"prose","fix":"f",
             "suggestion":null,"rule_quote":null,
             "semantic_key":"bugs/off-by-one-loop-bound","code_anchor":"AAA111AAA111"} ]
          JSON
          bash skills/woo-review/scripts/dedup-against-history.sh
          n=$(jq length /tmp/pr-review/findings.deduped.json)
          [ "$n" -eq 0 ] || { echo "expected 0, got $n"; exit 1; }
