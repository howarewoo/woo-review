# Self-test: validates this repo on every push / PR.
#
# The `unit` job runs on every event and is the only required check.
# The `review` and `parallel-review` jobs require the CLAUDE_CODE_OAUTH_TOKEN
# secret and are manual-only (workflow_dispatch) to avoid billing live AI calls
# on every push.

name: Self-test

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: shellcheck (shell scripts)
        run: |
          shellcheck --version
          # --severity=error keeps the gate strict on real bugs (parse failures,
          # broken redirects, etc.) while allowing progressive style cleanup.
          shellcheck --severity=error tests/*.sh skills/woo-review/scripts/*.sh

      - name: actionlint (workflow YAML)
        env:
          ACTIONLINT_VERSION: 1.7.7
        run: |
          set -euo pipefail
          curl -fsSL -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

      - name: Run detect-angles tests
        run: bash tests/detect-angles.test.sh

  review:
    name: Run self-review (manual)
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Run woo-review (Anthropic)
        # Token scoped to the single step that consumes it — keep it out of env
        # for shellcheck/actionlint/setup steps.
        env:
          ANTHROPIC_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        if: env.ANTHROPIC_TOKEN != ''
        uses: ./
        with:
          provider: anthropic
          anthropic_token: ${{ env.ANTHROPIC_TOKEN }}
          model: claude-sonnet-4-6

  parallel-review:
    name: Parallel self-review (manual)
    needs: unit
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Detect
        id: detect
        env:
          ANTHROPIC_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        if: env.ANTHROPIC_TOKEN != ''
        uses: ./
        with:
          mode: detect
          provider: anthropic
          anthropic_token: ${{ env.ANTHROPIC_TOKEN }}

      - name: Review (bugs angle only — matrix is exercised by reusable workflow)
        env:
          ANTHROPIC_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        if: env.ANTHROPIC_TOKEN != '' && steps.detect.outputs.angles_json != '[]'
        uses: ./
        with:
          mode: review
          angle: bugs
          provider: anthropic
          anthropic_token: ${{ env.ANTHROPIC_TOKEN }}
          model: claude-sonnet-4-6

      - name: Mock findings for other angles
        env:
          ANTHROPIC_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        if: env.ANTHROPIC_TOKEN != ''
        shell: bash
        run: |
          mkdir -p /tmp/pr-review
          echo "[]" > /tmp/pr-review/findings.security.json

      - name: Validate
        env:
          ANTHROPIC_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        if: env.ANTHROPIC_TOKEN != ''
        uses: ./
        with:
          mode: validate
          provider: anthropic
          anthropic_token: ${{ env.ANTHROPIC_TOKEN }}
          model: claude-sonnet-4-6
