# Self-test: runs the action against PRs opened in this repo, using whichever
# provider secret is available. Lets us validate the action end-to-end before
# tagging a release.

name: Self-test

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (detect-angles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run detect-angles tests
        run: bash tests/detect-angles.test.sh

  review:
    name: Run self-review
    runs-on: ubuntu-latest
    needs: unit
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@review')) ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run woo-review (Anthropic)
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        uses: ./
        with:
          provider: anthropic
          anthropic_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
          constitution_path: constitution.md

  parallel-review:
    name: Parallel self-review
    needs: unit
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Detect
        id: detect
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        uses: ./
        with:
          mode: detect
          provider: anthropic
          anthropic_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Review
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' && steps.detect.outputs.angles_json != '[]' }}
        # We manually simulate matrix by looping or just running one representative angle
        # since strategy.matrix only works at the job level. 
        # For self-test, we'll run the 'bugs' angle.
        uses: ./
        with:
          mode: review
          angle: bugs
          provider: anthropic
          anthropic_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6

      - name: Mock findings for other angles
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        shell: bash
        run: |
          mkdir -p /tmp/pr-review
          echo "[]" > /tmp/pr-review/findings.security.json

      - name: Validate
        if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
        uses: ./
        with:
          mode: validate
          provider: anthropic
          anthropic_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
